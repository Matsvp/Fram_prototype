<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FRAM – Enkel billettkjøp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8F9FA;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #6B7280;
      --border: #E8EAED;
      --primary: #00796B;
      --primary-light: rgba(0,121,107,0.08);
      --primary-dark: #005A4F;
      --success: #00C853;
      --warning: #FF9100;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font);
      background: linear-gradient(180deg, #E0F2F1 0%, var(--bg) 30%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }

    /* Phone Container */
    .phone {
      width: 375px;
      max-width: 100%;
      background: var(--bg);
      border-radius: 40px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.15), inset 0 0 0 12px #1a1a1a;
      overflow: hidden;
      position: relative;
    }

    .notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 100;
    }

    .screen {
      background: var(--bg);
      min-height: 720px;
      padding-top: 52px;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary) 0%, #26A69A 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--card);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s ease;
    }

    .header-btn:active { transform: scale(0.95); }

    .header-btn svg {
      width: 20px;
      height: 20px;
      stroke: var(--text);
    }

    /* Content */
    .content {
      flex: 1;
      padding: 0 16px 120px;
      overflow-y: auto;
    }

    /* Search Card */
    .search-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-md);
      margin-bottom: 12px;
    }

    .route-input {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    .route-dots {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0;
      gap: 4px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
    }

    .dot-line {
      width: 2px;
      flex: 1;
      background: var(--border);
      min-height: 24px;
    }

    .dot.outline {
      background: transparent;
      border: 2px solid var(--primary);
    }

    .route-fields {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .field:hover, .field:focus-within {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .field-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .field-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .field input {
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      width: 100%;
      outline: none;
      font-family: var(--font);
    }

    /* Options Row */
    .options-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .option-chip {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .option-chip:hover {
      border-color: var(--primary);
    }

    .option-chip svg {
      width: 18px;
      height: 18px;
      stroke: var(--text-secondary);
    }

    .option-chip span {
      font-size: 14px;
      font-weight: 500;
    }

    /* CTA Button */
    .cta-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s ease;
      font-family: var(--font);
    }

    .cta-btn:hover { background: var(--primary-dark); }
    .cta-btn:active { transform: scale(0.98); }
    .cta-btn:disabled {
      background: var(--border);
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    /* Ticket Card */
    .ticket-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      margin-bottom: 12px;
    }

    .ticket-header {
      background: linear-gradient(135deg, var(--primary) 0%, #26A69A 100%);
      color: white;
      padding: 16px 20px;
    }

    .ticket-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.2);
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .ticket-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .ticket-price {
      font-size: 28px;
      font-weight: 700;
    }

    .ticket-price span {
      font-size: 16px;
      font-weight: 500;
      opacity: 0.8;
    }

    .ticket-body {
      padding: 16px 20px;
    }

    .ticket-info {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .info-item {
      flex: 1;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 12px;
    }

    .info-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
    }

    .ticket-reason {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: var(--primary-light);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }

    .ticket-reason svg {
      width: 18px;
      height: 18px;
      stroke: var(--primary);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .ticket-reason p {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
    }

    .ticket-actions {
      display: flex;
      gap: 10px;
    }

    .btn-secondary {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font);
    }

    .btn-secondary:hover { background: var(--border); }

    .btn-primary {
      flex: 2;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font);
    }

    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.98); }

    /* Summary Card */
    .summary-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-md);
      margin-bottom: 12px;
    }

    .summary-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .summary-title {
      font-size: 16px;
      font-weight: 600;
    }

    .summary-edit {
      font-size: 14px;
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
    }

    .summary-route {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }

    .summary-route svg {
      width: 20px;
      height: 20px;
      stroke: var(--primary);
    }

    .summary-route-text {
      font-size: 14px;
    }

    .summary-route-text strong {
      display: block;
      font-weight: 600;
    }

    .summary-route-text span {
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* Checkout */
    .checkout-section {
      margin-top: 16px;
    }

    .checkout-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .payment-options {
      display: flex;
      gap: 8px;
    }

    .payment-option {
      flex: 1;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .payment-option.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .payment-option span {
      font-size: 14px;
      font-weight: 600;
    }

    /* Active Ticket */
    .active-ticket {
      background: linear-gradient(135deg, var(--primary) 0%, #26A69A 100%);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      color: white;
      box-shadow: var(--shadow-lg);
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .active-ticket::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    .active-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--success);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .active-badge svg {
      width: 14px;
      height: 14px;
    }

    .active-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .active-time {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .active-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .active-item {
      background: rgba(255,255,255,0.15);
      border-radius: var(--radius-sm);
      padding: 12px;
    }

    .active-item-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .active-item-value {
      font-size: 15px;
      font-weight: 600;
    }

    /* Bottom Bar */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bottom-info {
      flex: 1;
    }

    .bottom-title {
      font-size: 15px;
      font-weight: 600;
    }

    .bottom-sub {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .bottom-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font);
    }

    .bottom-btn:hover { background: var(--primary-dark); }
    .bottom-btn:active { transform: scale(0.98); }
    .bottom-btn:disabled {
      background: var(--border);
      color: var(--text-secondary);
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--text);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeIn 0.3s ease forwards;
    }

    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="header">
        <div class="logo-group">
          <div class="logo">F</div>
          <span class="logo-text">FRAM</span>
        </div>
        <button class="header-btn" id="menuBtn">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        </button>
      </div>

      <div class="content" id="viewRoot"></div>

      <div class="bottom-bar" id="bottomBar">
        <div class="bottom-info">
          <div class="bottom-title" id="bbTitle">Velg reise</div>
          <div class="bottom-sub" id="bbSub">Fyll inn fra og til</div>
        </div>
        <button class="bottom-btn" id="bbBtn" disabled>Søk</button>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    const state = {
      view: 'search',
      from: 'Molde trafikkterminal',
      to: 'Ålesund sentrum',
      time: 'Nå',
      passenger: 'Voksen',
      ticket: null,
      payment: 'Vipps',
      activeAt: null
    };

    const tickets = [
      {
        id: 'single',
        name: 'Enkeltbillett',
        price: 44,
        zones: 'Sone A–B',
        validFor: '60 min',
        why: 'Dekker hele reisen din fra Molde til Ålesund.',
        tag: 'Anbefalt'
      },
      {
        id: 'day',
        name: '24-timersbillett',
        price: 119,
        zones: 'Sone A–B',
        validFor: '24 timer',
        why: 'Lønner seg ved 3+ reiser samme dag.',
        tag: 'Alternativ'
      }
    ];

    function toast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function formatTime() {
      const d = new Date();
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function updateBottom(title, sub, btnText, enabled, onClick) {
      $('bbTitle').textContent = title;
      $('bbSub').textContent = sub;
      const btn = $('bbBtn');
      btn.textContent = btnText;
      btn.disabled = !enabled;
      btn.onclick = onClick;
    }

    function render() {
      const root = $('viewRoot');
      root.innerHTML = '';

      if (state.view === 'search') {
        root.appendChild(viewSearch());
        updateBottom('Klar til søk', `${state.from} → ${state.to}`, 'Finn billett', true, () => {
          state.ticket = tickets[0];
          state.view = 'suggestion';
          render();
        });
      }

      if (state.view === 'suggestion') {
        root.appendChild(viewSuggestion());
        updateBottom(
          state.ticket ? `${state.ticket.name}` : 'Velg billett',
          state.ticket ? `${state.ticket.price} kr · ${state.ticket.validFor}` : '',
          'Gå til betaling',
          !!state.ticket,
          () => { state.view = 'checkout'; render(); }
        );
      }

      if (state.view === 'checkout') {
        root.appendChild(viewCheckout());
        updateBottom(
          `Total: ${state.ticket.price} kr`,
          `Betaling med ${state.payment}`,
          'Betal nå',
          true,
          () => {
            state.activeAt = formatTime();
            state.view = 'ticket';
            toast('Billett kjøpt!');
            render();
          }
        );
      }

      if (state.view === 'ticket') {
        root.appendChild(viewTicket());
        updateBottom('Billett aktiv', 'Vis ved kontroll', 'Ny reise', true, () => {
          state.view = 'search';
          state.ticket = null;
          state.activeAt = null;
          render();
        });
      }
    }

    function viewSearch() {
      const el = document.createElement('div');
      el.className = 'animate-in';
      el.innerHTML = `
        <div class="search-card">
          <div class="route-input">
            <div class="route-dots">
              <div class="dot"></div>
              <div class="dot-line"></div>
              <div class="dot outline"></div>
            </div>
            <div class="route-fields">
              <div class="field">
                <div class="field-label">Fra</div>
                <input type="text" id="fromInput" value="${esc(state.from)}" />
              </div>
              <div class="field">
                <div class="field-label">Til</div>
                <input type="text" id="toInput" value="${esc(state.to)}" />
              </div>
            </div>
          </div>

          <div class="options-row">
            <div class="option-chip" id="timeChip">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
              </svg>
              <span id="timeLabel">${esc(state.time)}</span>
            </div>
            <div class="option-chip" id="passengerChip">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
              </svg>
              <span id="passengerLabel">${esc(state.passenger)}</span>
            </div>
          </div>
        </div>
      `;

      el.querySelector('#fromInput').addEventListener('input', e => { state.from = e.target.value; });
      el.querySelector('#toInput').addEventListener('input', e => { state.to = e.target.value; });

      el.querySelector('#timeChip').onclick = () => {
        const opts = ['Nå', 'Senere i dag', 'I morgen'];
        const idx = opts.indexOf(state.time);
        state.time = opts[(idx + 1) % opts.length];
        el.querySelector('#timeLabel').textContent = state.time;
      };

      el.querySelector('#passengerChip').onclick = () => {
        const opts = ['Voksen', 'Student', 'Barn'];
        const idx = opts.indexOf(state.passenger);
        state.passenger = opts[(idx + 1) % opts.length];
        el.querySelector('#passengerLabel').textContent = state.passenger;
      };

      return el;
    }

    function viewSuggestion() {
      const el = document.createElement('div');
      el.className = 'animate-in';

      const rec = tickets[0];
      const alt = tickets[1];

      el.innerHTML = `
        <div class="summary-card">
          <div class="summary-route">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
            </svg>
            <div class="summary-route-text">
              <strong>${esc(state.from)} → ${esc(state.to)}</strong>
              <span>${esc(state.time)} · ${esc(state.passenger)}</span>
            </div>
          </div>
        </div>

        <div class="ticket-card" id="recCard">
          <div class="ticket-header">
            <div class="ticket-badge">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
              </svg>
              ${rec.tag}
            </div>
            <div class="ticket-name">${rec.name}</div>
            <div class="ticket-price">${rec.price} <span>kr</span></div>
          </div>
          <div class="ticket-body">
            <div class="ticket-info">
              <div class="info-item">
                <div class="info-label">Soner</div>
                <div class="info-value">${rec.zones}</div>
              </div>
              <div class="info-item">
                <div class="info-label">Gyldig</div>
                <div class="info-value">${rec.validFor}</div>
              </div>
            </div>
            <div class="ticket-reason">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z" />
              </svg>
              <p>${rec.why}</p>
            </div>
            <div class="ticket-actions">
              <button class="btn-secondary" id="altBtn">Se alternativ</button>
              <button class="btn-primary" id="selectBtn">Velg denne</button>
            </div>
          </div>
        </div>
      `;

      el.querySelector('#selectBtn').onclick = () => {
        state.ticket = rec;
        toast('Billett valgt');
        render();
      };

      el.querySelector('#altBtn').onclick = () => {
        state.ticket = alt;
        toast('Alternativ valgt');
        render();
      };

      return el;
    }

    function viewCheckout() {
      const el = document.createElement('div');
      el.className = 'animate-in';
      el.innerHTML = `
        <div class="summary-card">
          <div class="summary-header">
            <div class="summary-title">Oppsummering</div>
            <button class="summary-edit" id="editBtn">Endre</button>
          </div>
          <div class="summary-route" style="margin-bottom: 12px;">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
            </svg>
            <div class="summary-route-text">
              <strong>${esc(state.from)} → ${esc(state.to)}</strong>
              <span>${esc(state.passenger)} · ${esc(state.time)}</span>
            </div>
          </div>
          <div class="ticket-info">
            <div class="info-item">
              <div class="info-label">Billett</div>
              <div class="info-value">${state.ticket.name}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Pris</div>
              <div class="info-value">${state.ticket.price} kr</div>
            </div>
          </div>
          <div class="checkout-section">
            <div class="checkout-label">Velg betaling</div>
            <div class="payment-options">
              <div class="payment-option ${state.payment === 'Vipps' ? 'active' : ''}" data-pay="Vipps">
                <span>Vipps</span>
              </div>
              <div class="payment-option ${state.payment === 'Kort' ? 'active' : ''}" data-pay="Kort">
                <span>Kort</span>
              </div>
              <div class="payment-option ${state.payment === 'Apple Pay' ? 'active' : ''}" data-pay="Apple Pay">
                <span>Apple Pay</span>
              </div>
            </div>
          </div>
        </div>
      `;

      el.querySelector('#editBtn').onclick = () => {
        state.view = 'suggestion';
        render();
      };

      el.querySelectorAll('.payment-option').forEach(opt => {
        opt.onclick = () => {
          state.payment = opt.dataset.pay;
          el.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
          opt.classList.add('active');
        };
      });

      return el;
    }

    function viewTicket() {
      const el = document.createElement('div');
      el.className = 'animate-in';
      el.innerHTML = `
        <div class="active-ticket">
          <div class="active-badge">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
            GYLDIG NÅ
          </div>
          <div class="active-name">${state.ticket.name}</div>
          <div class="active-time">Aktivert kl. ${state.activeAt}</div>
          <div class="active-grid">
            <div class="active-item">
              <div class="active-item-label">Soner</div>
              <div class="active-item-value">${state.ticket.zones}</div>
            </div>
            <div class="active-item">
              <div class="active-item-label">Gyldig i</div>
              <div class="active-item-value">${state.ticket.validFor}</div>
            </div>
            <div class="active-item">
              <div class="active-item-label">Reisende</div>
              <div class="active-item-value">${esc(state.passenger)}</div>
            </div>
            <div class="active-item">
              <div class="active-item-label">Betalt</div>
              <div class="active-item-value">${state.ticket.price} kr</div>
            </div>
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-route">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            <div class="summary-route-text">
              <strong>Gyldig for reisen</strong>
              <span>${esc(state.from)} → ${esc(state.to)}</span>
            </div>
          </div>
        </div>
      `;
      return el;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    $('menuBtn').onclick = () => toast('Meny kommer snart');

    render();
  </script>
</body>
</html>
